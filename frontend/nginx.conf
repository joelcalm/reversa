server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API and health checks to the backend service.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
    location /health {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
