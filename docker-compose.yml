# Optional containerized run.
# Local: mount ./data and skip download. Render: render-start.sh downloads from BOE_DB_URL.
services:
  backend:
    build: ./backend
    container_name: boe-backend
    environment:
      BOE_DB_PATH: /data/processed/boe_graph.db
      BOE_DB_SKIP_DOWNLOAD: "1"
    volumes:
      - ./data:/data
    ports:
      - "8088:8000"

  frontend:
    build: ./frontend
    container_name: boe-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
